<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAlert AI - Patient Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.patient {
            justify-content: flex-end;
        }
        
        .message.ai {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.patient .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.ai .message-content {
            background: white;
            color: #333;
            border: 1px solid #e1e5e9;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e5e9;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
        }
        
        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .chat-input button:hover {
            transform: translateY(-2px);
        }
        
        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            background: #e8f5e8;
            color: #2d5a2d;
            font-size: 14px;
        }
        
        .status.error {
            background: #ffeaea;
            color: #d32f2f;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 16px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            border: 1px solid #e1e5e9;
            max-width: 70%;
        }
        
        .typing-indicator.show {
            display: block;
        }
        
        .typing-dots {
            display: inline-block;
        }
        
        .typing-dots::after {
            content: '...';
            animation: typing 1.5s infinite;
        }
        
        @keyframes typing {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .checkup-done {
            margin-top: 10px;
            text-align: center;
        }
        
        .checkup-done button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .checkup-done button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🏥 MedAlert AI - Post-Surgery Helper
        </div>
        
        <div class="status" id="status">
            Connected to AI Assistant
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be added here -->
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-sender">MedAlert AI</div>
            <div class="typing-dots">Typing</div>
        </div>
        
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Describe your symptoms or how you're feeling..." />
            <button id="sendButton" onclick="sendMessage()">Send</button>
        </div>
        
        <div class="checkup-done">
            <button onclick="completeCheckup()">✅ Checkup Done - Send to Doctor</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8001/api';
        const patientId = 'demo_patient_123';
        
        let messages = [];
        
        // Initialize chat
        async function initChat() {
            try {
                const response = await fetch(`${API_BASE_URL}/patient/chat_history`);
                const chatHistory = await response.json();
                
                messages = chatHistory;
                displayMessages();
                
                updateStatus('Connected to AI Assistant', false);
            } catch (error) {
                console.error('Error loading chat history:', error);
                updateStatus('Error connecting to AI. Please check if the backend is running.', true);
            }
        }
        
        // Send message to AI
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message
            const userMessage = {
                _id: `user_${Date.now()}`,
                sender: 'patient',
                message: message,
                timestamp: new Date().toISOString()
            };
            
            messages.push(userMessage);
            displayMessages();
            input.value = '';
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const response = await fetch(`${API_BASE_URL}/patient/chatbot_message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        patient_id: patientId,
                        message: message
                    })
                });
                
                const aiResponse = await response.json();
                messages.push(aiResponse);
                
                hideTypingIndicator();
                displayMessages();
                
                // Scroll to bottom
                scrollToBottom();
                
                updateStatus('Connected to AI Assistant', false);
                
            } catch (error) {
                console.error('Error sending message:', error);
                hideTypingIndicator();
                
                // Add error message
                const errorMessage = {
                    _id: `error_${Date.now()}`,
                    sender: 'ai',
                    message: 'Sorry, I\'m having trouble connecting right now. Please try again.',
                    timestamp: new Date().toISOString()
                };
                
                messages.push(errorMessage);
                displayMessages();
                updateStatus('Error connecting to AI. Please try again.', true);
            }
        }
        
        // Complete checkup
        async function completeCheckup() {
            try {
                const response = await fetch(`${API_BASE_URL}/patient/generate_notes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        patient_id: patientId,
                        message: "Checkup completed"
                    })
                });
                
                const result = await response.json();
                alert(result.message || 'Checkup complete! Your notes have been sent to your doctor.');
                
                // Clear messages for new session
                messages = [{
                    _id: 'new_session',
                    sender: 'ai',
                    message: 'Thank you for completing your checkup! How are you feeling today?',
                    timestamp: new Date().toISOString()
                }];
                displayMessages();
                
            } catch (error) {
                console.error('Error completing checkup:', error);
                alert('Error completing checkup. Please try again.');
            }
        }
        
        // Display messages
        function displayMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.sender}`;
                
                const senderName = msg.sender === 'patient' ? 'You' : 'MedAlert AI';
                const time = new Date(msg.timestamp).toLocaleTimeString();
                
                messageDiv.innerHTML = `
                    <div class="message-content">
                        <div class="message-sender">${senderName}</div>
                        <div>${msg.message}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                container.appendChild(messageDiv);
            });
            
            scrollToBottom();
        }
        
        // Show/hide typing indicator
        function showTypingIndicator() {
            document.getElementById('typingIndicator').classList.add('show');
            scrollToBottom();
        }
        
        function hideTypingIndicator() {
            document.getElementById('typingIndicator').classList.remove('show');
        }
        
        // Scroll to bottom
        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }
        
        // Update status
        function updateStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'status error' : 'status';
        }
        
        // Event listeners
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initChat);
    </script>
</body>
</html>
